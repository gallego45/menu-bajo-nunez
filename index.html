<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Cervezas Bajo Núñez</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-4 sm:p-8 font-sans text-gray-900">

    <header class="mb-8 border-b-4 border-black pb-4">
        <h1 class="text-4xl font-black uppercase italic">Cervezas Bajo Núñez</h1>
    </header>

    <div id="menu-container">
        <p class="text-center py-10">Cargando menú...</p>
    </div>

    <script>
       const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdFHMhJq5XKLDcjR5gHqVYS7_LYOK6qcLnxeiSqQluawfBcvMVxtCfOI2uRZtQfPj6fBOZPMxTKy8r/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const respuesta = await fetch(SHEET_CSV_URL);
                const textoCsv = await respuesta.text();

                // Dividir por filas y saltar la cabecera
                const filas = textoCsv.split('\n').slice(1);
                const container = document.getElementById('menu-container');

                const categorias = {};

                // Procesar cada fila del Excel
                filas.forEach(linea => {
                    // El orden debe ser: Categoría, Marca, Nombre, Variedad, Formato, Precio
                    const columnas = linea.split(',');
                    if (columnas.length < 6) return;

                    const [cat, marca, nombre, variedad, formato, precio] = columnas;
                    const categoriaTrim = cat.trim();

                    if (!categorias[categoriaTrim]) {
                        categorias[categoriaTrim] = [];
                    }
                    categorias[categoriaTrim].push({ marca, nombre, variedad, formato, precio });
                });

                // Generar el HTML
                let htmlFinal = '';
                for (const [nombreCat, items] of Object.entries(categorias)) {
                    htmlFinal += `
                    <section class="mb-10">
                        <h2 class="text-2xl font-bold bg-gray-100 p-2 mb-4 border-l-4 border-black uppercase">${nombreCat}</h2>
                        <div class="space-y-2">`;

                    items.forEach(item => {
                        htmlFinal += `
                        <div class="flex items-center justify-between border-b border-gray-200 py-2 text-sm sm:text-base">
                            <div class="w-1/3 font-bold">${item.marca} <span class="font-normal text-gray-600 block sm:inline italic text-xs">${item.nombre}</span></div>
                            <div class="w-1/4 text-gray-600">${item.variedad}</div>
                            <div class="w-1/6 text-center">${item.formato}</div>
                            <div class="w-1/4 text-right font-black">${item.precio}</div>
                        </div>`;
                    });

                    htmlFinal += `</div></section>`;
                }

                container.innerHTML = htmlFinal;

            } catch (error) {
                console.error("Error cargando el menú:", error);
                document.getElementById('menu-container').innerHTML = "<p>Error al cargar los datos del Excel.</p>";
            }
        }

        cargarMenu();
    </script>
</body>
</html>
