<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Cervezas - Bajo Núñez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --naranja-nunez: #ef8b33; }
        .bg-nunez { background-color: var(--naranja-nunez); }
        .text-nunez { color: var(--naranja-nunez); }
        .border-nunez { border-color: var(--naranja-nunez); }
        body { background-color: #f4f1ea; background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png"); }
    </style>
</head>
<body class="p-4 sm:p-8 font-sans text-gray-900">

    <header class="flex flex-col items-center mb-10 border-b-4 border-black pb-6">
        <img src="bajoNunezLogo.jpg" alt="Bajo Núñez" class="w-48 h-48 object-contain mb-2">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter text-center">Catálogo de Cervezas</h1>
    </header>

    <div id="menu-container" class="max-w-3xl mx-auto">
        <p class="text-center italic animate-pulse">Consultando la heladera...</p>
    </div>

    <script>
        const URL_NACIONALES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdFHMhJq5XKLDcjR5gHqVYS7_LYOK6qcLnxeiSqQluawfBcvMVxtCfOI2uRZtQfPj6fBOZPMxTKy8r/pub?gid=0&single=true&output=csv';
        const URL_IMPORTADOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdFHMhJq5XKLDcjR5gHqVYS7_LYOK6qcLnxeiSqQluawfBcvMVxtCfOI2uRZtQfPj6fBOZPMxTKy8r/pub?gid=488168618&single=true&output=csv'; 

        async function cargarMenu() {
            try {
                const [resNac, resInt] = await Promise.all([
                    fetch(URL_NACIONALES),
                    fetch(URL_IMPORTADOS)
                ]);

                const textoNac = await resNac.text();
                const textoInt = await resInt.text();

                const container = document.getElementById('menu-container');
                const categorias = {};

                const procesarBloque = (texto) => {
                    const filas = texto.split('\n').slice(1).filter(f => f.trim() !== '');
                    filas.forEach(linea => {
                        const columnas = linea.split(',').map(c => c.trim());
                        if (columnas.length < 6) return;

                        const [seccion, marca, nombre, variedad, formato, precio, stock] = columnas;
                        if (stock && stock.toUpperCase() === 'NO') return;
                        if (!seccion) return;

                        if (!categorias[seccion]) categorias[seccion] = {};
                        if (!categorias[seccion][marca]) categorias[seccion][marca] = [];
                        
                        categorias[seccion][marca].push({ marca, nombre, variedad, formato, precio });
                    });
                };

                procesarBloque(textoNac);
                procesarBloque(textoInt);

                let htmlFinal = '';

                for (const [nombreSec, subGrupos] of Object.entries(categorias)) {
                    htmlFinal += `
                    <section class="mb-12">
                        <h2 class="text-3xl font-black bg-black text-white p-3 mb-6 uppercase italic border-b-8 border-nunez">${nombreSec}</h2>`;
                    
                    const marcasOrdenadas = Object.keys(subGrupos).sort();

                    marcasOrdenadas.forEach(nombreMarca => {
                        const productos = subGrupos[nombreMarca];

                        // ORDENAMIENTO POR PRECIO (Menor a Mayor)
                        productos.sort((a, b) => {
                            const precioA = parseFloat(a.precio.replace(/[^0-9.-]+/g,""));
                            const precioB = parseFloat(b.precio.replace(/[^0-9.-]+/g,""));
                            return precioA - precioB;
                        });

                        htmlFinal += `
                        <div class="mb-8">
                            <h3 class="text-xl font-bold text-nunez border-b-2 border-nunez mb-4 uppercase italic ml-2">
                                ${nombreMarca}
                            </h3>
                            <div class="space-y-4">`;

                        productos.forEach(item => {
                            const esInternacional = nombreSec.toLowerCase().includes('internacional');
                            const textoVariedad = esInternacional ? "" : item.variedad;
                        
                            htmlFinal += `
                            <div class="flex items-center justify-between border-b border-gray-200 py-3 px-2 hover:bg-orange-50 transition-colors">
                                <div class="w-1/2 leading-tight">
                                    <span class="font-bold block uppercase text-sm sm:text-base">${item.nombre}</span>
                                </div>
                                <div class="w-1/4 text-gray-600 text-[10px] sm:text-xs italic">${textoVariedad}</div>
                                <div class="w-1/12 text-center font-bold text-gray-400 text-[10px] uppercase">${item.formato}</div>
                                <div class="w-1/4 text-right font-black text-lg sm:text-xl text-black">$${item.precio}</div>
                            </div>`;
                        });
                        htmlFinal += `</div></div>`;
                    });
                    htmlFinal += `</section>`;
                }
                container.innerHTML = htmlFinal || "<p class='text-center'>No hay productos disponibles.</p>";

            } catch (error) {
                console.error(error);
                document.getElementById('menu-container').innerHTML = "<p class='text-center text-red-500'>Error de conexión.</p>";
            }
        }
        cargarMenu();
    </script>
</body>
</html>
