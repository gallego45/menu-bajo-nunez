<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Cervezas Bajo Núñez</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-4 sm:p-8 font-sans text-gray-900">

    <header class="mb-8 border-b-4 border-black pb-4">
        <h1 class="text-4xl font-black uppercase italic">Cervezas Bajo Núñez</h1>
    </header>

    <section class="mb-10">
        <h2 class="text-2xl font-bold bg-gray-100 p-2 mb-4 border-l-4 border-black uppercase">Importadas</h2>

        <div class="space-y-2">
            <div class="flex items-center justify-between border-b border-gray-200 py-2 text-sm sm:text-base">
                <div class="w-1/3 font-bold">Shoferhoffer</div>
                <div class="w-1/4 text-gray-600">Trigo</div>
                <div class="w-1/6 text-center">500ml</div>
                <div class="w-1/4 text-right font-black">$10.000</div>
            </div>

            <div class="flex items-center justify-between border-b border-gray-200 py-2 text-sm sm:text-base">
                <div class="w-1/3 font-bold">Delirium Tremens</div>
                <div class="w-1/4 text-gray-600 text-xs sm:text-sm">Strong Blond Ale</div>
                <div class="w-1/6 text-center">330ml</div>
                <div class="w-1/4 text-right font-black">$15.000</div>
            </div>
        </div>
    </section>

    <section>
        <h2 class="text-2xl font-bold bg-gray-100 p-2 mb-2 border-l-4 border-black uppercase">Nacionales</h2>

        <h3 class="text-lg font-bold text-red-700 mt-4 mb-2 ml-2">NEIPAS</h3>
        <div class="space-y-2">
            <div class="flex items-center justify-between border-b border-gray-100 py-2">
                <div class="w-1/3 font-medium text-gray-800">Strange</div>
                <div class="w-1/4 text-gray-500 italic">--</div>
                <div class="w-1/6 text-center">500ml</div>
                <div class="w-1/4 text-right font-bold">$9.000</div>
            </div>
        </div>
    </section>

</body>
</html>
